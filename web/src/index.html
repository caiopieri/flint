<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Flint</title>
    <!-- Design tokens (generated from tokens.json) — same source as the native
         chrome, so the editor matches across the WKWebView seam (ADR-D03). -->
    <link rel="stylesheet" href="./tokens.css" />
    <style>
      :root { color-scheme: light dark; }
      html, body, #editor { margin: 0; height: 100%; }
      body {
        background: var(--flint-bg);
        color: var(--flint-text-primary);
        font-family: var(--flint-font-sans);
        -webkit-text-size-adjust: 100%;
      }
      #editor { height: 100vh; }
      .cm-editor { height: 100%; }
    </style>
  </head>
  <body>
    <div id="editor"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
