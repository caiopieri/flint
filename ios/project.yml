name: Flint
options:
  bundleIdPrefix: com.caiopieri.flint
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Flint:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Flint
        excludes:
          - "Resources/web/**"
      - path: Flint/Resources/web
        type: folder
        buildPhase: resources
    info:
      path: Flint/Info.plist
      properties:
        CFBundleDisplayName: Flint
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caiopieri.flint
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: Generate design tokens
        basedOnDependencyAnalysis: false
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if command -v node >/dev/null 2>&1; then
            node "$PROJECT_DIR/../scripts/gen-tokens.mjs"
          else
            echo "warning: node not found — keeping existing Tokens.swift/tokens.css" >&2
          fi
      - name: Build web bundle
        basedOnDependencyAnalysis: false
        script: |
          "$PROJECT_DIR/../scripts/build-web.sh"
  FlintTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FlintTests
    dependencies:
      - target: Flint
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.caiopieri.flint.tests
schemes:
  Flint:
    build:
      targets:
        Flint: all
        FlintTests: [test]
    test:
      targets:
        - FlintTests
    run:
      config: Debug
